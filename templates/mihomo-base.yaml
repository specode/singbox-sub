mixed-port: 7890
allow-lan: false
ipv6: false
mode: rule
log-level: info
unified-delay: true
geodata-loader: memconservative

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: false
  override-destination: true
  sniff:
    TLS:
      ports:
        - 443
      override-destination: true
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com

dns:
  enable: true
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/15
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.localhost"
    - "*.home.arpa"
    - "*.invalid"
    - "*.test"
    - localhost
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - "+.pool.ntp.org"
    - stun.*.*
    - stun.*.*.*
    - swscan.apple.com
    - mesu.apple.com
    - music.163.com
    - "*.music.163.com"
    - "*.126.net"
    - y.qq.com
    - "*.y.qq.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "*.*.*.srv.nintendo.net"
    - "*.*.stun.playstation.net"
    - xbox.*.*.microsoft.com
    - "*.*.xboxlive.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN

proxies:
  - name: "Reality-154.17.234.37"
    type: vless
    server: "154.17.234.37"
    port: 8443
    uuid: "__UUID__"
    udp: true
    tls: true
    network: tcp
    flow: "xtls-rprx-vision"
    packet-encoding: xudp
    servername: "www.cloudflare.com"
    client-fingerprint: "chrome"
    reality-opts:
      public-key: "jN9SoV2ySHWSZqALxpPfbKjsccEQSoyWKNaUVn2_V3o"
      short-id: "0a79af70ac4f2127"
    encryption: none

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "Reality-154.17.234.37"
      - DIRECT
  - name: Apple
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - PROXY
  - name: FINAL
    type: select
    proxies:
      - PROXY
      - DIRECT

