server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/empty;
    charset utf-8;
    access_log off;
    error_page 403 404 = @empty_404;

    autoindex off;

    types {
        text/yaml yaml yml;
        application/json json;
        text/plain txt conf;
    }
    default_type text/yaml;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location = /healthz {
        return 200 "ok\n";
    }

    location @empty_404 {
        return 404 "";
    }

    location ~ (^|/)\. {
        return 404;
    }

    location ~ "^/s/([A-Za-z0-9_-]{16,128})$" {
        root /srv/sub-configs;
        try_files /$1.yaml /$1.yml /$1 =404;
    }

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        return 404;
    }
}
